<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Auto-Save</title>
    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div class="container">
        <h2>Word Auto-Save</h2>
        
        <div class="card">
            <div class="toggle-container">
                <div class="toggle-label">
                    <span id="toggle-status">ON</span>
                    <span class="toggle-desc">Automatically save changes</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="autosave-toggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div class="status-container" id="status-card">
            <div class="status-icon" id="status-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="status-details">
                <p id="status-indicator" class="status-message active">Auto-saving is active...</p>
                <p id="last-saved-time">Last saved: Not yet</p>
            </div>
        </div>
        
        <div class="info-section">
            <p>Checks for unsaved changes every 10 seconds and saves quietly in the background.</p>
        </div>
    </div>
    
    <script src="taskpane.js"></script>
</body>
</html>

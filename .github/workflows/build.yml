name: Build VSTO Add-in

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore WordAutosave.sln

    - name: Generate Self-Signed Certificate for ClickOnce Signing
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate `
          -Subject "CN=WordAutosave Dev" `
          -CertStoreLocation "Cert:\CurrentUser\My" `
          -Type CodeSigningCert `
          -KeySpec Signature `
          -KeyUsage DigitalSignature `
          -FriendlyName "WordAutosave Dev Cert"
        $password = ConvertTo-SecureString -String "DevPassword123" -Force -AsPlainText
        $pfxPath = "${{ github.workspace }}\WordAutosave\WordAutosave_TemporaryKey.pfx"
        Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $password
        Write-Host "Certificate generated at $pfxPath"

    - name: Build Solution
      run: |
        msbuild WordAutosave.sln `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:ManifestKeyFile=WordAutosave_TemporaryKey.pfx `
          /p:ManifestSigningPassword=DevPassword123 `
          /p:SignManifests=true

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Word-AutoSave-VSTO
        path: WordAutosave\bin\Release\
